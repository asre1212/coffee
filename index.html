
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Coffee Gazette" />
  <meta name="theme-color" content="#E5E5E0" />
  <title>The Coffee Gazette</title>
  <link rel="apple-touch-icon" href="icons/icon-180.png" />
  <link rel="icon" type="image/png" href="icons/icon-192.png" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Lora:ital,wght@0,400;0,600;1,400&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: #F9F9F7; }
    #root { height: 100%; }

    .app {
      max-width: 430px;
      margin: 0 auto;
      min-height: 100vh;
      min-height: -webkit-fill-available;
      background: #F9F9F7;
      font-family: 'Inter', 'Helvetica Neue', sans-serif;
      position: relative;
      overflow-x: hidden;
    }

    /* Newsprint grain texture */
    .app::before {
      content: '';
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 9999;
      opacity: 0.6;
    }

    /* Masthead — light grey */
    .masthead {
      border-bottom: 4px solid #111111;
      padding: 14px 16px 12px;
      background: #E5E5E0;
    }
    .masthead-overline {
      font-family: 'Inter', sans-serif;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #CC0000;
      margin-bottom: 2px;
    }
    .masthead-title {
      font-family: 'Playfair Display', serif;
      font-size: 28px;
      font-weight: 900;
      line-height: 1;
      color: #111111;
      letter-spacing: -0.5px;
    }
    .masthead-sub {
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px;
      color: #525252;
      margin-top: 4px;
      letter-spacing: 0.05em;
    }

    /* Tabs */
    .tab-bar {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      border-bottom: 4px solid #111111;
    }
    .tab-btn {
      background: #F9F9F7;
      border: none;
      border-right: 1px solid #111111;
      padding: 10px 8px;
      font-family: 'Inter', sans-serif;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #737373;
      cursor: pointer;
      transition: background 0.1s;
      position: relative;
      -webkit-tap-highlight-color: transparent;
    }
    .tab-btn:last-child { border-right: none; }
    .tab-btn.active {
      background: #111111;
      color: #F9F9F7;
    }
    .tab-btn.active::after {
      content: '';
      position: absolute;
      bottom: -4px;
      left: 0; right: 0;
      height: 4px;
      background: #CC0000;
    }

    /* Add button bar */
    .add-bar {
      padding: 10px 16px;
      border-bottom: 1px solid #111111;
      display: flex;
      justify-content: flex-end;
      background: #F0F0EE;
    }
    .btn-add {
      background: #111111;
      color: #F9F9F7;
      border: none;
      font-family: 'Inter', sans-serif;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 7px 14px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: background 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-add:hover { background: #CC0000; }

    /* Roast group label */
    .roast-group-header {
      padding: 6px 16px;
      background: #111111;
      color: #F9F9F7;
      font-family: 'Inter', sans-serif;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      border-bottom: 1px solid #333;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .roast-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      display: inline-block;
      flex-shrink: 0;
    }
    .roast-dot.light { background: #D4A96A; }
    .roast-dot.medium { background: #8B5E3C; }
    .roast-dot.dark { background: #2C1810; }

    /* Bean card */
    .bean-card {
      border-bottom: 1px solid #111111;
      padding: 12px 16px;
      background: #F9F9F7;
      cursor: pointer;
      transition: background 0.1s;
      position: relative;
      -webkit-tap-highlight-color: transparent;
    }
    .bean-card:hover, .bean-card:active { background: #F0F0EE; }
    .bean-card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 4px;
    }
    .bean-name {
      font-family: 'Playfair Display', serif;
      font-size: 16px;
      font-weight: 700;
      color: #111111;
      line-height: 1.2;
      flex: 1;
      margin-right: 8px;
    }
    .bean-roaster {
      font-family: 'Lora', serif;
      font-size: 11px;
      color: #737373;
      font-style: italic;
      margin-bottom: 6px;
    }
    .bean-meta-row {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    .decaf-badge {
      font-family: 'Inter', sans-serif;
      font-size: 8px;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      border: 1px solid #111111;
      padding: 2px 5px;
      color: #111111;
      background: transparent;
    }
    .caff-badge {
      font-family: 'Inter', sans-serif;
      font-size: 8px;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      border: 1px solid #CC0000;
      padding: 2px 5px;
      color: #CC0000;
      background: transparent;
    }
    .instructions-preview {
      font-family: 'Lora', serif;
      font-size: 11px;
      color: #525252;
      margin-top: 6px;
      line-height: 1.4;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    /* Rating display */
    .rating-display {
      display: flex;
      align-items: center;
      gap: 3px;
      flex-shrink: 0;
    }
    .rating-num {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      font-weight: 600;
      color: #111111;
    }

    /* Empty state */
    .empty-state {
      padding: 48px 24px;
      text-align: center;
      border-bottom: 1px solid #E5E5E0;
    }
    .empty-state-title {
      font-family: 'Playfair Display', serif;
      font-size: 20px;
      font-weight: 700;
      color: #111111;
      margin-bottom: 8px;
    }
    .empty-state-sub {
      font-family: 'Lora', serif;
      font-style: italic;
      font-size: 13px;
      color: #737373;
    }

    /* Modal overlay */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(17,17,17,0.7);
      z-index: 1000;
      display: flex;
      align-items: flex-end;
      justify-content: center;
    }
    .modal-sheet {
      background: #F9F9F7;
      width: 100%;
      max-width: 430px;
      max-height: 92vh;
      max-height: 92dvh;
      overflow-y: auto;
      border-top: 4px solid #CC0000;
      -webkit-overflow-scrolling: touch;
    }
    .modal-header {
      padding: 14px 16px 12px;
      border-bottom: 2px solid #111111;
      background: #111111;
      color: #F9F9F7;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .modal-title {
      font-family: 'Playfair Display', serif;
      font-size: 18px;
      font-weight: 700;
      color: #F9F9F7;
    }
    .modal-close {
      background: none;
      border: 1px solid #525252;
      color: #F9F9F7;
      width: 32px;
      height: 32px;
      font-size: 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Inter', sans-serif;
      transition: border-color 0.1s;
      -webkit-tap-highlight-color: transparent;
      flex-shrink: 0;
    }
    .modal-close:hover, .modal-close:active { border-color: #CC0000; color: #CC0000; }

    /* Form */
    .form-body {
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 0;
    }
    .form-field {
      border-bottom: 1px solid #E5E5E0;
      padding: 12px 0;
    }
    .form-field:first-child { padding-top: 0; }
    .form-label {
      font-family: 'Inter', sans-serif;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #737373;
      margin-bottom: 6px;
      display: block;
    }
    .form-input {
      width: 100%;
      background: transparent;
      border: 1px solid #E5E5E0;
      border-bottom: 2px solid #111111;
      padding: 8px 10px;
      font-family: 'Lora', serif;
      font-size: 16px; /* 16px prevents iOS zoom */
      color: #111111;
      outline: none;
      border-radius: 0;
      transition: border-color 0.15s;
      -webkit-appearance: none;
    }
    .form-input:focus { border-color: #111111; border-bottom-color: #CC0000; }
    .form-textarea {
      width: 100%;
      background: transparent;
      border: 1px solid #E5E5E0;
      border-bottom: 2px solid #111111;
      padding: 8px 10px;
      font-family: 'Lora', serif;
      font-size: 16px; /* 16px prevents iOS zoom */
      color: #111111;
      outline: none;
      border-radius: 0;
      resize: vertical;
      min-height: 90px;
      line-height: 1.5;
      transition: border-color 0.15s;
      -webkit-appearance: none;
    }
    .form-textarea:focus { border-bottom-color: #CC0000; }

    /* Roast selector */
    .roast-selector {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      border: 1px solid #111111;
    }
    .roast-opt {
      padding: 9px 6px;
      text-align: center;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #737373;
      border-right: 1px solid #111111;
      background: transparent;
      transition: background 0.1s, color 0.1s;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      -webkit-tap-highlight-color: transparent;
    }
    .roast-opt:last-child { border-right: none; }
    .roast-opt.selected.light { background: #D4A96A; color: #111111; }
    .roast-opt.selected.medium { background: #8B5E3C; color: #F9F9F7; }
    .roast-opt.selected.dark { background: #2C1810; color: #F9F9F7; }
    .roast-circle {
      width: 14px;
      height: 14px;
      border-radius: 50%;
    }
    .roast-circle.light { background: #D4A96A; border: 1px solid #111; }
    .roast-circle.medium { background: #8B5E3C; }
    .roast-circle.dark { background: #2C1810; }

    /* Caffeine toggle */
    .toggle-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      border: 1px solid #111111;
    }
    .toggle-opt {
      padding: 10px 8px;
      text-align: center;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #737373;
      border-right: 1px solid #111111;
      background: transparent;
      transition: background 0.1s, color 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .toggle-opt:last-child { border-right: none; }
    .toggle-opt.selected-caff { background: #111111; color: #F9F9F7; }
    .toggle-opt.selected-decaf { background: #737373; color: #F9F9F7; }

    /* Rating input */
    .bean-rating-row {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .bean-icons-row {
      display: flex;
      gap: 4px;
      align-items: center;
    }
    .rating-num-display {
      font-family: 'JetBrains Mono', monospace;
      font-size: 20px;
      font-weight: 600;
      color: #111111;
      min-width: 38px;
    }
    .rating-slider {
      flex: 1;
      -webkit-appearance: none;
      appearance: none;
      height: 3px;
      background: #E5E5E0;
      border: none;
      outline: none;
      border-radius: 0;
      cursor: pointer;
    }
    .rating-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 22px;
      height: 22px;
      background: #111111;
      cursor: pointer;
      border-radius: 0;
      border: 2px solid #F9F9F7;
      box-shadow: 0 0 0 1px #111111;
    }
    .rating-slider::-moz-range-thumb {
      width: 22px;
      height: 22px;
      background: #111111;
      cursor: pointer;
      border-radius: 0;
      border: 2px solid #F9F9F7;
      box-shadow: 0 0 0 1px #111111;
    }
    .rating-scale-labels {
      display: flex;
      justify-content: space-between;
      margin-top: 4px;
    }
    .rating-scale-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px;
      color: #A3A3A3;
    }

    /* Form actions */
    .form-actions {
      padding: 16px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      border-top: 2px solid #111111;
      position: sticky;
      bottom: 0;
      background: #F9F9F7;
    }
    .btn-cancel {
      background: transparent;
      border: 1px solid #111111;
      color: #111111;
      font-family: 'Inter', sans-serif;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 12px;
      cursor: pointer;
      transition: background 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-cancel:hover, .btn-cancel:active { background: #F0F0EE; }
    .btn-save {
      background: #111111;
      border: 1px solid #111111;
      color: #F9F9F7;
      font-family: 'Inter', sans-serif;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 12px;
      cursor: pointer;
      transition: background 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-save:hover, .btn-save:active { background: #CC0000; border-color: #CC0000; }

    /* Detail view */
    .detail-back {
      padding: 10px 16px;
      border-bottom: 1px solid #111111;
      background: #F0F0EE;
    }
    .btn-back {
      background: none;
      border: none;
      font-family: 'Inter', sans-serif;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #111111;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 4px 0;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-back:hover, .btn-back:active { color: #CC0000; }
    .detail-hero {
      padding: 20px 16px 16px;
      border-bottom: 2px solid #111111;
    }
    .detail-roast-label {
      font-family: 'Inter', sans-serif;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #CC0000;
      margin-bottom: 4px;
    }
    .detail-bean-name {
      font-family: 'Playfair Display', serif;
      font-size: 26px;
      font-weight: 900;
      color: #111111;
      line-height: 1.1;
      margin-bottom: 4px;
    }
    .detail-roaster {
      font-family: 'Lora', serif;
      font-style: italic;
      font-size: 14px;
      color: #737373;
      margin-bottom: 12px;
    }
    .detail-rating-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }
    .detail-rating-num {
      font-family: 'JetBrains Mono', monospace;
      font-size: 24px;
      font-weight: 600;
      color: #111111;
    }
    .detail-meta-badges {
      display: flex;
      gap: 6px;
    }
    .detail-instructions-section {
      padding: 16px;
      border-bottom: 1px solid #E5E5E0;
    }
    .detail-section-label {
      font-family: 'Inter', sans-serif;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #737373;
      margin-bottom: 10px;
    }
    .detail-instructions-text {
      font-family: 'Lora', serif;
      font-size: 14px;
      color: #111111;
      line-height: 1.7;
      white-space: pre-wrap;
    }
    .detail-actions {
      padding: 16px;
      display: flex;
      gap: 8px;
    }
    .btn-delete {
      background: transparent;
      border: 1px solid #CC0000;
      color: #CC0000;
      font-family: 'Inter', sans-serif;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 12px 16px;
      cursor: pointer;
      transition: background 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-delete:hover, .btn-delete:active { background: #CC0000; color: #F9F9F7; }
    .btn-edit {
      background: #111111;
      border: 1px solid #111111;
      color: #F9F9F7;
      font-family: 'Inter', sans-serif;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 12px 16px;
      cursor: pointer;
      flex: 1;
      transition: background 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-edit:hover, .btn-edit:active { background: #333; }

    /* 3-column brew method tab bar (origin moved to bottom) */
    .tab-bar { grid-template-columns: 1fr 1fr 1fr; }

    /* Sticky bottom origin bar */
    .origin-bar {
      position: sticky;
      bottom: 0;
      z-index: 100;
      border-top: 3px solid #111111;
      background: #F9F9F7;
    }
    .btn-origin {
      width: 100%;
      background: #F9F9F7;
      border: none;
      padding: 11px 16px;
      font-family: 'Inter', sans-serif;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #737373;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: background 0.1s, color 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-origin:hover, .btn-origin:active { background: #F0F0EE; }
    .btn-origin.active {
      background: #111111;
      color: #F9F9F7;
    }
    .origin-bar.two-cols {
      display: grid;
      grid-template-columns: 1fr 1fr;
    }
    .origin-bar.two-cols .btn-origin {
      border-right: 1px solid #111111;
    }
    .origin-bar.two-cols .btn-origin:last-child {
      border-right: none;
    }

    /* Notes section — small, low-emphasis footer */
    .notes-section {
      border-top: 4px double #111111;
      background: #F0F0EE;
      margin-top: 8px;
    }
    .notes-header {
      padding: 9px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: pointer;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    .notes-title {
      font-family: 'Inter', sans-serif;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #525252;
    }
    .notes-toggle {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      color: #737373;
      letter-spacing: 0.05em;
    }
    .notes-header:hover .notes-toggle,
    .notes-header:active .notes-toggle { color: #CC0000; }
    .notes-body {
      padding: 4px 16px 14px;
      border-top: 1px solid #E5E5E0;
    }
    .notes-textarea {
      width: 100%;
      background: #F9F9F7;
      border: 1px solid #E5E5E0;
      border-bottom: 2px solid #111111;
      padding: 10px 12px;
      font-family: 'Lora', serif;
      font-size: 14px; /* under 16 ok in textarea but keep readable */
      color: #111111;
      outline: none;
      border-radius: 0;
      resize: vertical;
      min-height: 110px;
      line-height: 1.6;
      margin-top: 10px;
      -webkit-appearance: none;
    }
    .notes-textarea:focus { border-bottom-color: #CC0000; }
    .notes-help {
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px;
      color: #A3A3A3;
      margin-top: 6px;
      letter-spacing: 0.05em;
    }

    /* MASL altitude chip / readout */
    .country-display-chip.masl-chip {
      border-color: #8B5E3C;
      color: #8B5E3C;
    }
    .masl-value {
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      font-weight: 600;
      color: #111111;
      letter-spacing: 0.02em;
    }
    .origin-close-bar {
      padding: 10px 16px;
      border-bottom: 1px solid #111111;
      background: #F0F0EE;
    }
    .btn-origin-close {
      background: none;
      border: none;
      font-family: 'Inter', sans-serif;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #111111;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 4px 0;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-origin-close:hover, .btn-origin-close:active { color: #CC0000; }

    /* Country selector */
    .country-selected-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      margin-bottom: 8px;
      min-height: 0;
    }
    .country-chip {
      display: flex;
      align-items: center;
      gap: 4px;
      background: #111111;
      color: #F9F9F7;
      font-family: 'Inter', sans-serif;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 3px 7px 3px 8px;
      border: 1px solid #111111;
    }
    .country-chip-remove {
      background: none;
      border: none;
      color: #A3A3A3;
      font-size: 11px;
      cursor: pointer;
      padding: 0;
      line-height: 1;
      -webkit-tap-highlight-color: transparent;
    }
    .country-chip-remove:hover { color: #CC0000; }
    .country-search {
      width: 100%;
      background: transparent;
      border: none;
      border-bottom: 1px solid #E5E5E0;
      padding: 6px 0;
      font-family: 'Lora', serif;
      font-size: 14px;
      color: #111111;
      outline: none;
      margin-bottom: 4px;
    }
    .country-search:focus { border-bottom-color: #CC0000; }
    .country-search::placeholder { color: #A3A3A3; font-style: italic; }
    .country-list {
      max-height: 140px;
      overflow-y: auto;
      border: 1px solid #E5E5E0;
      -webkit-overflow-scrolling: touch;
    }
    .country-list-item {
      padding: 8px 10px;
      font-family: 'Lora', serif;
      font-size: 13px;
      color: #111111;
      cursor: pointer;
      border-bottom: 1px solid #E5E5E0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      -webkit-tap-highlight-color: transparent;
      transition: background 0.1s;
    }
    .country-list-item:last-child { border-bottom: none; }
    .country-list-item:hover, .country-list-item:active { background: #F0F0EE; }
    .country-list-item.selected { background: #F5F5F5; color: #737373; }
    .country-list-item.selected::after { content: "✓"; color: #111111; font-weight: 700; font-size: 12px; }
    .country-list-item.add-custom { color: #CC0000; font-style: italic; }
    .country-display-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      margin-top: 4px;
    }
    .country-display-chip {
      font-family: 'Inter', sans-serif;
      font-size: 8px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      border: 1px solid #737373;
      padding: 2px 6px;
      color: #525252;
    }

    .linked-bean-select {
      width: 100%;
      background: transparent;
      border: 1px solid #E5E5E0;
      border-bottom: 2px solid #111111;
      padding: 8px 10px;
      font-family: 'Lora', serif;
      font-size: 16px;
      color: #111111;
      outline: none;
      border-radius: 0;
      -webkit-appearance: none;
    }
    .linked-bean-help {
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px;
      color: #737373;
      margin-top: 6px;
      line-height: 1.4;
    }

    /* Origin tab view */
    .origin-summary-bar {
      padding: 10px 16px;
      border-bottom: 1px solid #111111;
      background: #F0F0EE;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .origin-summary-text {
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px;
      color: #525252;
      letter-spacing: 0.05em;
    }
    .origin-country-header {
      padding: 8px 16px;
      background: #111111;
      color: #F9F9F7;
      border-bottom: 1px solid #333;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .origin-country-name {
      font-family: 'Playfair Display', serif;
      font-size: 15px;
      font-weight: 700;
      color: #F9F9F7;
      flex: 1;
    }
    .origin-country-meta {
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px;
      color: #A3A3A3;
      text-align: right;
    }
    .origin-bean-card {
      border-bottom: 1px solid #111111;
      padding: 10px 16px;
      background: #F9F9F7;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 8px;
    }
    .origin-bean-left { flex: 1; min-width: 0; }
    .origin-bean-name {
      font-family: 'Playfair Display', serif;
      font-size: 14px;
      font-weight: 700;
      color: #111111;
      line-height: 1.2;
      margin-bottom: 2px;
    }
    .origin-bean-roaster {
      font-family: 'Lora', serif;
      font-size: 11px;
      font-style: italic;
      color: #737373;
      margin-bottom: 4px;
    }
    .origin-bean-tags {
      display: flex;
      gap: 4px;
      flex-wrap: wrap;
    }
    .origin-method-badge {
      font-family: 'Inter', sans-serif;
      font-size: 8px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      border: 1px solid #E5E5E0;
      padding: 2px 5px;
      color: #737373;
    }
    .origin-bean-right {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 3px;
      flex-shrink: 0;
    }

    /* Settings button in masthead */
    .masthead-row {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
    }
    .btn-settings {
      background: none;
      border: 1px solid #737373;
      color: #525252;
      width: 30px;
      height: 30px;
      font-size: 14px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      margin-top: 2px;
      -webkit-tap-highlight-color: transparent;
      transition: border-color 0.1s, color 0.1s;
    }
    .btn-settings:hover, .btn-settings:active { border-color: #CC0000; color: #CC0000; }

    /* Settings bottom sheet */
    .settings-section-label {
      font-family: 'Inter', sans-serif;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #737373;
      padding: 14px 16px 6px;
      border-bottom: 1px solid #E5E5E0;
    }
    .settings-row {
      padding: 14px 16px;
      border-bottom: 1px solid #E5E5E0;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .settings-row-title {
      font-family: 'Playfair Display', serif;
      font-size: 15px;
      font-weight: 700;
      color: #111111;
    }
    .settings-row-desc {
      font-family: 'Lora', serif;
      font-size: 12px;
      font-style: italic;
      color: #737373;
      line-height: 1.4;
    }
    .btn-settings-action {
      margin-top: 8px;
      background: #111111;
      border: 1px solid #111111;
      color: #F9F9F7;
      font-family: 'Inter', sans-serif;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 10px 16px;
      cursor: pointer;
      align-self: flex-start;
      transition: background 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-settings-action:hover, .btn-settings-action:active { background: #CC0000; border-color: #CC0000; }
    .btn-settings-action.outline {
      background: transparent;
      color: #111111;
    }
    .btn-settings-action.outline:hover, .btn-settings-action.outline:active {
      background: #F0F0EE;
      border-color: #111111;
      color: #111111;
    }
    .import-msg {
      margin-top: 8px;
      padding: 8px 10px;
      font-family: 'Lora', serif;
      font-size: 12px;
      border-left: 3px solid #111111;
    }
    .import-msg.success { border-color: #2E7D32; color: #2E7D32; background: #F0FFF0; }
    .import-msg.error   { border-color: #CC0000; color: #CC0000; background: #FFF5F5; }
    .settings-stat {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      color: #525252;
      margin-top: 2px;
    }
    /* Hidden file input */
    .import-file-input { display: none; }

    /* Edition bar */
    .edition-bar {
      padding: 5px 16px;
      border-bottom: 1px solid #111111;
      background: #E5E5E0;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .edition-text {
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px;
      color: #525252;
      letter-spacing: 0.05em;
    }

    /* ── v4 additions ──────────────────────────────────────────────────── */
    /* Zero-specificity reset for controls converted from <div> to <button>,
       so the existing class rules above keep winning. */
    :where(button.roast-opt, button.toggle-opt, button.country-list-item, button.notes-header, button.search-clear) {
      appearance: none;
      -webkit-appearance: none;
      border: none;
      margin: 0;
      padding: 0;
      background: transparent;
      font: inherit;
      color: inherit;
      text-align: inherit;
      border-radius: 0;
    }
    button.notes-header, button.country-list-item { width: 100%; }
    .bean-card:focus-visible,
    button.roast-opt:focus-visible,
    button.toggle-opt:focus-visible,
    button.country-list-item:focus-visible,
    button.notes-header:focus-visible {
      outline: 2px solid #CC0000;
      outline-offset: -2px;
    }
    .btn-delete.confirm { background: #CC0000; color: #F9F9F7; }
    .search-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 4px 16px 8px;
      border-bottom: 1px solid #111111;
      background: #F9F9F7;
    }
    .search-input {
      flex: 1;
      appearance: none;
      -webkit-appearance: none;
      background: transparent;
      border: none;
      border-bottom: 1px solid #E5E5E0;
      border-radius: 0;
      padding: 6px 0;
      font-family: 'Lora', serif;
      font-size: 14px;
      color: #111111;
      outline: none;
    }
    .search-input:focus { border-bottom-color: #CC0000; }
    .search-input::placeholder { color: #A3A3A3; font-style: italic; }
    .search-input::-webkit-search-cancel-button { -webkit-appearance: none; }
    .search-clear {
      font-family: 'Inter', sans-serif;
      font-size: 12px;
      color: #737373;
      cursor: pointer;
      padding: 4px 6px;
    }
    .search-clear:hover, .search-clear:active { color: #CC0000; }
    .settings-stat.backup-warn { color: #B45309; font-weight: 600; }
    .btn-settings-action:disabled { opacity: 0.5; cursor: default; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="vendor/react.production.min.js"></script>
  <script src="vendor/react-dom.production.min.js"></script>
  <script src="app.js"></script>
  <script>
    if ("serviceWorker" in navigator && location.protocol !== "file:") {
      window.addEventListener("load", function () {
        navigator.serviceWorker.register("sw.js").catch(function () {});
      });
    }
  </script>
</body>
</html>
