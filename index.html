  <meta name="apple-mobile-web-app-title" content="Coffee Gazette" />

  <title>The Coffee Gazette</title>
  <link rel="apple-touch-icon" id="app-icon" />
  <link rel="icon" id="favicon" type="image/png" />
  <script>
    // Generate coffee bean icon via canvas — used as home screen icon & favicon
    (function() {
      var canvas = document.createElement('canvas');
      canvas.width = 180;
      canvas.height = 180;
      var ctx = canvas.getContext('2d');

      // Background: warm off-white newsprint
      ctx.fillStyle = '#111111';
      ctx.fillRect(0, 0, 180, 180);

      // Inner padding circle feel — draw the bean centred in the canvas
      // Scale factor: original SVG is 24x24, canvas is 180x180 → factor 7.5
      // Bean ellipse: cx=12 cy=12 rx=7 ry=10, rotated -20deg around (12,12)
      ctx.save();
      ctx.translate(90, 90);          // move to canvas centre
      ctx.rotate(-20 * Math.PI / 180);

      // Filled ellipse body
      ctx.beginPath();
      ctx.ellipse(0, 0, 52, 74, 0, 0, Math.PI * 2);
      ctx.fillStyle = '#C4894A';
      ctx.fill();

      // Outer stroke
      ctx.strokeStyle = '#7A4A1E';
      ctx.lineWidth = 3;
      ctx.stroke();

      ctx.restore();

      // Crease line — unrotated in original SVG coords, scaled × 7.5
      // M9 6 Q14 12 9 18  →  M(67.5,45) Q(105,90) (67.5,135)
      ctx.beginPath();
      ctx.moveTo(67.5, 45);
      ctx.quadraticCurveTo(105, 90, 67.5, 135);
      ctx.strokeStyle = 'rgba(17,17,17,0.55)';
      ctx.lineWidth = 6;
      ctx.lineCap = 'round';
      ctx.stroke();

      var dataUrl = canvas.toDataURL('image/png');
      document.getElementById('app-icon').setAttribute('href', dataUrl);
      document.getElementById('favicon').setAttribute('href', dataUrl);
    })();
  </script>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: #F9F9F7; }
    #root { height: 100%; }

    .app {
      max-width: 430px;
      margin: 0 auto;
      min-height: 100vh;
      min-height: -webkit-fill-available;
      background: #F9F9F7;
      font-family: 'Inter', 'Helvetica Neue', sans-serif;
      position: relative;
      overflow-x: hidden;
    }

    /* Newsprint grain texture */
    .app::before {
      content: '';
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 9999;
      opacity: 0.6;
    }

    /* Masthead — light grey */
    .masthead {
      border-bottom: 4px solid #111111;
      padding: 14px 16px 12px;
      background: #E5E5E0;
    }
    .masthead-overline {
      font-family: 'Inter', sans-serif;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #CC0000;
      margin-bottom: 2px;
    }
    .masthead-title {
      font-family: 'Playfair Display', serif;
      font-size: 28px;
      font-weight: 900;
      line-height: 1;
      color: #111111;
      letter-spacing: -0.5px;
    }
    .masthead-sub {
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px;
      color: #525252;
      margin-top: 4px;
      letter-spacing: 0.05em;
    }

    /* Tabs */
    .tab-bar {
      display: grid;
      grid-template-columns: 1fr 1fr;
      border-bottom: 4px solid #111111;
    }
    .tab-btn {
      background: #F9F9F7;
      border: none;
      border-right: 1px solid #111111;
      padding: 10px 8px;
      font-family: 'Inter', sans-serif;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #737373;
      cursor: pointer;
      transition: background 0.1s;
      position: relative;
      -webkit-tap-highlight-color: transparent;
    }
    .tab-btn:last-child { border-right: none; }
    .tab-btn.active {
      background: #111111;
      color: #F9F9F7;
    }
    .tab-btn.active::after {
      content: '';
      position: absolute;
      bottom: -4px;
      left: 0; right: 0;
      height: 4px;
      background: #CC0000;
    }

    /* Add button bar */
    .add-bar {
      padding: 10px 16px;
      border-bottom: 1px solid #111111;
      display: flex;
      justify-content: flex-end;
      background: #F0F0EE;
    }
    .btn-add {
      background: #111111;
      color: #F9F9F7;
      border: none;
      font-family: 'Inter', sans-serif;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 7px 14px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: background 0.1s;
      -webkit-tap-highlight-color: transparent;

    /* Modal overlay */
    .modal-overlay {

      inset: 0;
      background: rgba(17,17,17,0.7);
      z-index: 1000;
      display: flex;
      align-items: flex-end;
      justify-content: center;
    }
    .modal-sheet {
      background: #F9F9F7;
      width: 100%;
      max-width: 430px;
      max-height: 92vh;
      max-height: 92dvh;
      overflow-y: auto;
      border-top: 4px solid #CC0000;
      -webkit-overflow-scrolling: touch;
    }
    .modal-header {
      padding: 14px 16px 12px;
      border-bottom: 2px solid #111111;
      background: #111111;
      color: #F9F9F7;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .modal-title {
      font-family: 'Playfair Display', serif;
      font-size: 18px;
      font-weight: 700;
      color: #F9F9F7;
    }
    .modal-close {
      background: none;
      border: 1px solid #525252;
      color: #F9F9F7;
      width: 32px;
      height: 32px;
      font-size: 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Inter', sans-serif;
      transition: border-color 0.1s;
      -webkit-tap-highlight-color: transparent;
      flex-shrink: 0;
    }
    .modal-close:hover, .modal-close:active { border-color: #CC0000; color: #CC0000; }

    /* Form */
    .form-body {
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 0;
    }
    .form-field {
      border-bottom: 1px solid #E5E5E0;
      padding: 12px 0;
    }
    .form-field:first-child { padding-top: 0; }
    .form-label {
      font-family: 'Inter', sans-serif;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #737373;
      margin-bottom: 6px;
      display: block;
    }
    .form-input {
      width: 100%;
      background: transparent;
      border: 1px solid #E5E5E0;
      border-bottom: 2px solid #111111;
      padding: 8px 10px;
      font-family: 'Lora', serif;
      font-size: 16px; /* 16px prevents iOS zoom */
      color: #111111;
      outline: none;
      border-radius: 0;
      transition: border-color 0.15s;
      -webkit-appearance: none;
    }
    .form-input:focus { border-color: #111111; border-bottom-color: #CC0000; }
    .form-textarea {
      width: 100%;
      background: transparent;
      border: 1px solid #E5E5E0;
      border-bottom: 2px solid #111111;
      padding: 8px 10px;
      font-family: 'Lora', serif;
      font-size: 16px; /* 16px prevents iOS zoom */
      color: #111111;
      outline: none;
      border-radius: 0;
      resize: vertical;
      min-height: 90px;
      line-height: 1.5;
      transition: border-color 0.15s;
      -webkit-appearance: none;
    }
    .form-textarea:focus { border-bottom-color: #CC0000; }

    /* Roast selector */
    .roast-selector {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      border: 1px solid #111111;
    }
    .roast-opt {
      padding: 9px 6px;
      text-align: center;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #737373;
      border-right: 1px solid #111111;
      background: transparent;
      transition: background 0.1s, color 0.1s;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      -webkit-tap-highlight-color: transparent;
    }
    .roast-opt:last-child { border-right: none; }
    .roast-opt.selected.light { background: #D4A96A; color: #111111; }
    .roast-opt.selected.medium { background: #8B5E3C; color: #F9F9F7; }
    .roast-opt.selected.dark { background: #2C1810; color: #F9F9F7; }
    .roast-circle {
      width: 14px;
      height: 14px;
      border-radius: 50%;
    }
    .roast-circle.light { background: #D4A96A; border: 1px solid #111; }
    .roast-circle.medium { background: #8B5E3C; }
    .roast-circle.dark { background: #2C1810; }

    /* Caffeine toggle */
    .toggle-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      border: 1px solid #111111;
    }
    .toggle-opt {
      padding: 10px 8px;
      text-align: center;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #737373;
      border-right: 1px solid #111111;
      background: transparent;
      transition: background 0.1s, color 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .toggle-opt:last-child { border-right: none; }
    .toggle-opt.selected-caff { background: #111111; color: #F9F9F7; }
    .toggle-opt.selected-decaf { background: #737373; color: #F9F9F7; }

    /* Rating input */
    .bean-rating-row {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .bean-icons-row {
      display: flex;
      gap: 4px;
      align-items: center;
    }
    .rating-num-display {
      font-family: 'JetBrains Mono', monospace;
      font-size: 20px;
      font-weight: 600;
      color: #111111;
      min-width: 38px;
    }
    .rating-slider {
      flex: 1;
      -webkit-appearance: none;
      appearance: none;
      height: 3px;
      background: #E5E5E0;
      border: none;
      outline: none;
      border-radius: 0;
      cursor: pointer;
    }
    .rating-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 22px;
      height: 22px;
      background: #111111;
      cursor: pointer;
      border-radius: 0;
      border: 2px solid #F9F9F7;
      box-shadow: 0 0 0 1px #111111;
    }
    .rating-slider::-moz-range-thumb {
      width: 22px;
      height: 22px;
      background: #111111;
      cursor: pointer;
      border-radius: 0;
      border: 2px solid #F9F9F7;
      box-shadow: 0 0 0 1px #111111;
    }
    .rating-scale-labels {
      display: flex;
      justify-content: space-between;
      margin-top: 4px;
    }
    .rating-scale-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px;
      color: #A3A3A3;
    }

    /* Form actions */
    .form-actions {
      padding: 16px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      border-top: 2px solid #111111;
      position: sticky;
      bottom: 0;
      background: #F9F9F7;
    }
    .btn-cancel {
      background: transparent;
      border: 1px solid #111111;
      color: #111111;
      font-family: 'Inter', sans-serif;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 12px;
      cursor: pointer;
      transition: background 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-cancel:hover, .btn-cancel:active { background: #F0F0EE; }
    .btn-save {
      background: #111111;
      border: 1px solid #111111;
      color: #F9F9F7;
      font-family: 'Inter', sans-serif;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 12px;
      cursor: pointer;
      transition: background 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-save:hover, .btn-save:active { background: #CC0000; border-color: #CC0000; }

    /* Detail view */
    .detail-back {
      padding: 10px 16px;
      border-bottom: 1px solid #111111;
      background: #F0F0EE;
    }
    .btn-back {
      background: none;
      border: none;
      font-family: 'Inter', sans-serif;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #111111;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 4px 0;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-back:hover, .btn-back:active { color: #CC0000; }
    .detail-hero {
      padding: 20px 16px 16px;
      border-bottom: 2px solid #111111;
    }
    .detail-roast-label {
      font-family: 'Inter', sans-serif;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #CC0000;
      margin-bottom: 4px;
    }
    .detail-bean-name {
      font-family: 'Playfair Display', serif;
      font-size: 26px;
      font-weight: 900;
      color: #111111;
      line-height: 1.1;
      margin-bottom: 4px;
    }
    .detail-roaster {
      font-family: 'Lora', serif;
      font-style: italic;
      font-size: 14px;
      color: #737373;
      margin-bottom: 12px;
    }
    .detail-rating-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }
    .detail-rating-num {
      font-family: 'JetBrains Mono', monospace;
      font-size: 24px;
      font-weight: 600;
      color: #111111;
    }
    .detail-meta-badges {
      display: flex;
      gap: 6px;
    }
    .detail-instructions-section {
      padding: 16px;
      border-bottom: 1px solid #E5E5E0;
    }
    .detail-section-label {
      font-family: 'Inter', sans-serif;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #737373;
      margin-bottom: 10px;
    }
    .detail-instructions-text {
      font-family: 'Lora', serif;
      font-size: 14px;
      color: #111111;
      line-height: 1.7;
      white-space: pre-wrap;
    }
    .detail-actions {
      padding: 16px;
      display: flex;
      gap: 8px;
    }

      background: transparent;
      border: 1px solid #CC0000;
      color: #CC0000;
      font-family: 'Inter', sans-serif;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 12px 16px;
      cursor: pointer;
      transition: background 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-delete:hover, .btn-delete:active { background: #CC0000; color: #F9F9F7; }
    .btn-edit {
      background: #111111;
      border: 1px solid #111111;
      color: #F9F9F7;
      font-family: 'Inter', sans-serif;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 12px 16px;

      transition: background 0.1s;

    }

    /* 2-column tab bar (origin moved to bottom) */
    .tab-bar { grid-template-columns: 1fr 1fr; }

    /* Sticky bottom origin bar */
    .origin-bar {
      position: sticky;
      bottom: 0;
      z-index: 100;
      border-top: 3px solid #111111;
      background: #F9F9F7;
    }
    .btn-origin {
      width: 100%;
      background: #F9F9F7;
      border: none;
      padding: 11px 16px;
      font-family: 'Inter', sans-serif;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;

      cursor: pointer;

      align-items: center;

    /* Country selector */
    .country-selected-chips {

      width: 100%;

      cursor: pointer;
      border-bottom: 1px solid #E5E5E0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      -webkit-tap-highlight-color: transparent;
      transition: background 0.1s;
    }
    .country-list-item:last-child { border-bottom: none; }
    .country-list-item:hover, .country-list-item:active { background: #F0F0EE; }
    .country-list-item.selected { background: #F5F5F5; color: #737373; }
    .country-list-item.selected::after { content: "✓"; color: #111111; font-weight: 700; font-size: 12px; }
    .country-list-item.add-custom { color: #CC0000; font-style: italic; }
    .country-display-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      margin-top: 4px;
    }
    .country-display-chip {
      font-family: 'Inter', sans-serif;
      font-size: 8px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      border: 1px solid #737373;
      padding: 2px 6px;
      color: #525252;
    }

    /* Origin tab view */
    .origin-summary-bar {
      padding: 10px 16px;
      border-bottom: 1px solid #111111;
      background: #F0F0EE;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .origin-summary-text {
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px;
      color: #525252;
      letter-spacing: 0.05em;
    }
    .origin-country-header {
      padding: 8px 16px;
      background: #111111;
      color: #F9F9F7;
      border-bottom: 1px solid #333;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .origin-country-name {
      font-family: 'Playfair Display', serif;
      font-size: 15px;
      font-weight: 700;
      color: #F9F9F7;
      flex: 1;
    }
    .origin-country-meta {
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px;
      color: #A3A3A3;
      text-align: right;
    }
    .origin-bean-card {
      border-bottom: 1px solid #111111;
      padding: 10px 16px;
      background: #F9F9F7;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 8px;
    }
    .origin-bean-left { flex: 1; min-width: 0; }
    .origin-bean-name {
      font-family: 'Playfair Display', serif;
      font-size: 14px;
      font-weight: 700;
      color: #111111;
      line-height: 1.2;
      margin-bottom: 2px;
    }
    .origin-bean-roaster {
      font-family: 'Lora', serif;
      font-size: 11px;
      font-style: italic;
      color: #737373;
      margin-bottom: 4px;
    }
    .origin-bean-tags {
      display: flex;
      gap: 4px;
      flex-wrap: wrap;
    }
    .origin-method-badge {
      font-family: 'Inter', sans-serif;
      font-size: 8px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      border: 1px solid #E5E5E0;
      padding: 2px 5px;
      color: #737373;
    }
    .origin-bean-right {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 3px;
      flex-shrink: 0;
    }

    /* Settings button in masthead */
    .masthead-row {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
    }
    .btn-settings {
      background: none;
      border: 1px solid #737373;
      color: #525252;
      width: 30px;
      height: 30px;
      font-size: 14px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      margin-top: 2px;
      -webkit-tap-highlight-color: transparent;
      transition: border-color 0.1s, color 0.1s;
    }
    .btn-settings:hover, .btn-settings:active { border-color: #CC0000; color: #CC0000; }

    /* Settings bottom sheet */
    .settings-section-label {
      font-family: 'Inter', sans-serif;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #737373;
      padding: 14px 16px 6px;
      border-bottom: 1px solid #E5E5E0;
    }
    .settings-row {
      padding: 14px 16px;
      border-bottom: 1px solid #E5E5E0;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .settings-row-title {
      font-family: 'Playfair Display', serif;
      font-size: 15px;
      font-weight: 700;
      color: #111111;
    }
    .settings-row-desc {
      font-family: 'Lora', serif;
      font-size: 12px;
      font-style: italic;
      color: #737373;
      line-height: 1.4;
    }
    .btn-settings-action {
      margin-top: 8px;
      background: #111111;
      border: 1px solid #111111;
      color: #F9F9F7;
      font-family: 'Inter', sans-serif;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 10px 16px;
      cursor: pointer;
      align-self: flex-start;
      transition: background 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-settings-action:hover, .btn-settings-action:active { background: #CC0000; border-color: #CC0000; }
    .btn-settings-action.outline {
      background: transparent;
      color: #111111;
    }
    .btn-settings-action.outline:hover, .btn-settings-action.outline:active {
      background: #F0F0EE;
      border-color: #111111;
      color: #111111;
    }
    .import-msg {
      margin-top: 8px;
      padding: 8px 10px;
      font-family: 'Lora', serif;
      font-size: 12px;
      border-left: 3px solid #111111;
    }
    .import-msg.success { border-color: #2E7D32; color: #2E7D32; background: #F0FFF0; }
    .import-msg.error   { border-color: #CC0000; color: #CC0000; background: #FFF5F5; }
    .settings-stat {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      color: #525252;
      margin-top: 2px;
    }
    /* Hidden file input */
    .import-file-input { display: none; }

    /* Edition bar */
    .edition-bar {
      padding: 5px 16px;
      border-bottom: 1px solid #111111;
      background: #E5E5E0;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .edition-text {
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px;
      color: #525252;
      letter-spacing: 0.05em;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    const STORAGE_KEY = "coffee-gazette-data-v3";

    const SAMPLE_DATA = {
      pourover: [],
      espresso: [],
    };

    function loadData() {
      try {
        const saved = localStorage.getItem(STORAGE_KEY);
        return saved ? JSON.parse(saved) : SAMPLE_DATA;
      } catch (e) {
        return SAMPLE_DATA;
      }
    }

    function saveData(data) {
      try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
      } catch (e) {}
    }

    const ROAST_ORDER = ["light", "medium", "dark"];

    const defaultForm = {
      name: "",
      roaster: "",
      roast: "light",
      rating: 4.0,
      caffeine: "caffeine",
      instructions: "",
      countries: [],
    };

    const formatDate = () =>
      new Date().toLocaleDateString("en-US", {
        weekday: "short", year: "numeric", month: "short", day: "numeric",
      }).toUpperCase();

    // Coffee bean SVG — supports partial fill for decimals
    function BeanIcon({ filled = true, partial = 0, size = 16 }) {
      const uid = React.useId ? React.useId() : Math.random().toString(36).slice(2);
      const clipId = `bc-${uid}`;
      const fillWidth = filled ? 24 : partial * 24;
      return (
        <svg width={size} height={size} viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" style={{flexShrink:0}}>
          <defs>
            <clipPath id={clipId}>
              <rect x="0" y="0" width={fillWidth} height="24" />
            </clipPath>
          </defs>
          <ellipse cx="12" cy="12" rx="7" ry="10" stroke="#8B5E3C" strokeWidth="1.5" fill="#F9F9F7" transform="rotate(-20 12 12)" />
          <path d="M9 6 Q14 12 9 18" stroke="#8B5E3C" strokeWidth="1.5" fill="none" strokeLinecap="round" />
          <g clipPath={`url(#${clipId})`}>
            <ellipse cx="12" cy="12" rx="7" ry="10" fill="#8B5E3C" transform="rotate(-20 12 12)" />
            <path d="M9 6 Q14 12 9 18" stroke="#F9F9F7" strokeWidth="1.5" fill="none" strokeLinecap="round" />
          </g>
        </svg>
      );
    }

    function BeanRating({ rating, size = 16 }) {
      const beans = [];
      for (let i = 1; i <= 5; i++) {
        if (i <= Math.floor(rating)) {
          beans.push(<BeanIcon key={i} filled={true} size={size} />);
        } else if (i === Math.ceil(rating) && rating % 1 > 0) {
          beans.push(<BeanIcon key={i} filled={false} partial={rating % 1} size={size} />);
        } else {
          beans.push(<BeanIcon key={i} filled={false} partial={0} size={size} />);
        }
      }
      return <div className="bean-icons-row">{beans}</div>;
    }

    const COFFEE_COUNTRIES = [
      "Bolivia","Brazil","Burundi","China","Colombia","Congo",
      "Costa Rica","Cuba","Ecuador","El Salvador","Ethiopia",
      "Guatemala","Haiti","Honduras","India","Indonesia","Jamaica",
      "Kenya","Laos","Madagascar","Malawi","Mexico","Myanmar",
      "Nicaragua","Panama","Papua New Guinea","Peru","Philippines",
      "Rwanda","Tanzania","Thailand","Timor-Leste","Uganda",
      "Venezuela","Vietnam","Yemen","Zambia","Zimbabwe",
    ];

    function CountrySelector({ selected, onChange }) {
      const [query, setQuery] = useState("");

      const filtered = query.trim()
        ? COFFEE_COUNTRIES.filter(c =>
            c.toLowerCase().includes(query.toLowerCase()) && !selected.includes(c)
          )
        : COFFEE_COUNTRIES.filter(c => !selected.includes(c));

      const showAddCustom =
        query.trim() &&
        !COFFEE_COUNTRIES.some(c => c.toLowerCase() === query.toLowerCase()) &&
        !selected.some(c => c.toLowerCase() === query.toLowerCase());

      const toggle = (country) => {
        if (selected.includes(country)) {
          onChange(selected.filter(c => c !== country));
        } else {
          onChange([...selected, country]);
          setQuery("");
        }
      };

      const addCustom = () => {
        const val = query.trim();
        if (val && !selected.includes(val)) {
          onChange([...selected, val]);
        }
        setQuery("");
      };

      return (
        <div>
          {selected.length > 0 && (
            <div className="country-selected-chips">
              {selected.map(c => (
                <span key={c} className="country-chip">
                  {c}
                  <button className="country-chip-remove" onClick={() => toggle(c)}>✕</button>
                </span>
              ))}
            </div>
          )}
          <input
            className="country-search"
            placeholder="Search or type a country…"
            value={query}
            onChange={e => setQuery(e.target.value)}
          />
          <div className="country-list">
            {filtered.slice(0, 40).map(c => (
              <div
                key={c}
                className={`country-list-item${selected.includes(c) ? " selected" : ""}`}
                onClick={() => toggle(c)}
              >
                {c}
              </div>
            ))}
            {showAddCustom && (
              <div className="country-list-item add-custom" onClick={addCustom}>
                + Add "{query.trim()}"
              </div>
            )}
            {filtered.length === 0 && !showAddCustom && (
              <div className="country-list-item" style={{color:"#A3A3A3",fontStyle:"italic",cursor:"default"}}>
                No matches
              </div>
            )}
          </div>
        </div>
      );
    }

    // ── Export: download all data as a .json file ──────────────────────────
    function exportData(data) {
      const payload = {
        _app: "coffee-gazette",
        _version: 2,
        _exported: new Date().toISOString(),
        ...data,
      };
      const blob = new Blob([JSON.stringify(payload, null, 2)], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = `coffee-gazette-backup-${new Date().toISOString().slice(0,10)}.json`;
      a.click();
      URL.revokeObjectURL(url);
    }

    // ── Import: read a .json file and restore data ──────────────────────────
    function importData(file, onSuccess, onError) {
      const reader = new FileReader();
      reader.onload = (e) => {
        try {
          const parsed = JSON.parse(e.target.result);
          // Accept both raw shape and exported shape with _meta keys
          const pourover = Array.isArray(parsed.pourover) ? parsed.pourover : [];
          const espresso = Array.isArray(parsed.espresso) ? parsed.espresso : [];
          if (pourover.length === 0 && espresso.length === 0) {
            onError("No valid entries found in this file.");
            return;
          }
          onSuccess({ pourover, espresso });
        } catch {
          onError("Could not read file. Make sure it's a Coffee Gazette backup.");
        }
      };
      reader.readAsText(file);
    }

    function CoffeeLog() {
      const [activeTab, setActiveTab] = useState("espresso");
      const [data, setData] = useState(loadData);
      const [showForm, setShowForm] = useState(false);
      const [editingId, setEditingId] = useState(null);
      const [form, setForm] = useState(defaultForm);
      const [detailId, setDetailId] = useState(null);
      const [showSettings, setShowSettings] = useState(false);
      const [importMsg, setImportMsg] = useState(null); // { type: "success"|"error", text }
      const [showOrigin, setShowOrigin] = useState(false);

      useEffect(() => {
        saveData(data);
      }, [data]);

      const handleExport = () => {
        exportData(data);
      };

      const handleImportFile = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        importData(
          file,
          (newData) => {
            setData(newData);
            setImportMsg({ type: "success", text: `Imported ${newData.pourover.length + newData.espresso.length} entries successfully.` });
            e.target.value = "";
          },
          (errMsg) => {
            setImportMsg({ type: "error", text: errMsg });
            e.target.value = "";
          }
        );
      };

      const currentBeans = data[activeTab] || [];

      const grouped = ROAST_ORDER.reduce((acc, roast) => {
        const items = currentBeans
          .filter((b) => b.roast === roast)
          .sort((a, b) => b.rating - a.rating);
        if (items.length) acc[roast] = items;
        return acc;
      }, {});

      const openAdd = () => {
        setForm(defaultForm);
        setEditingId(null);
        setShowForm(true);
      };

      const openEdit = (bean) => {
        setForm({ ...bean });
        setEditingId(bean.id);
        setShowForm(true);
        setDetailId(null);
      };

      const closeForm = () => {
        setShowForm(false);
        setEditingId(null);
      };

      const saveForm = () => {
        if (!form.name.trim()) return;
        setData((prev) => {
          const list = [...prev[activeTab]];
          if (editingId) {
            const idx = list.findIndex((b) => b.id === editingId);
            if (idx !== -1) list[idx] = { ...form, id: editingId };
          } else {
            list.push({ ...form, id: Date.now().toString() });
          }
          return { ...prev, [activeTab]: list };
        });
        closeForm();
      };

      const deleteBean = (id) => {
        setData((prev) => ({
          ...prev,
          [activeTab]: prev[activeTab].filter((b) => b.id !== id),
        }));
        setDetailId(null);
      };

      const detailBean = currentBeans.find((b) => b.id === detailId);

      const switchTab = (tab) => {
        setActiveTab(tab);
        setDetailId(null);
        setShowOrigin(false);
      };

      return (
        <div className="app">
          {/* Masthead */}
          <div className="masthead">
            <div className="masthead-overline">Daily Record</div>
            <div className="masthead-row">
              <div className="masthead-title">The Coffee Gazette</div>
              <button className="btn-settings" onClick={() => { setShowSettings(true); setImportMsg(null); }} title="Settings / Export / Import">
                ⚙
              </button>
            </div>
            <div className="masthead-sub">{formatDate()} · BREW LOG · EST. 2021</div>
          </div>

          {/* Tabs */}
          <div className="tab-bar">
            <button className={`tab-btn ${activeTab === "pourover" ? "active" : ""}`} onClick={() => switchTab("pourover")}>▲ Pour Over</button>
            <button className={`tab-btn ${activeTab === "espresso" ? "active" : ""}`} onClick={() => switchTab("espresso")}>◉ Espresso</button>
          </div>

          {/* ── Origin view ─────────────────────────────────────────────── */}
          {showOrigin && (() => {
            const allBeans = [
              ...data.pourover.map(b => ({ ...b, method: "Pour Over" })),
              ...data.espresso.map(b => ({ ...b, method: "Espresso"  })),
            ];

            // Build country → beans map; beans with no countries go under "Unspecified"
            const countryMap = {};
            allBeans.forEach(bean => {
              const cs = bean.countries && bean.countries.length > 0 ? bean.countries : ["Unspecified"];
              cs.forEach(c => {
                if (!countryMap[c]) countryMap[c] = [];
                countryMap[c].push(bean);
              });
            });

            // Sort countries alphabetically, Unspecified last
            const sortedCountries = Object.keys(countryMap).sort((a, b) => {
              if (a === "Unspecified") return 1;
              if (b === "Unspecified") return -1;
              return a.localeCompare(b);
            });

            const totalCountries = sortedCountries.filter(c => c !== "Unspecified").length;

            return (
              <>
                <div className="origin-close-bar">
                  <button className="btn-origin-close" onClick={() => setShowOrigin(false)}>
                    ← Back to {activeTab === "pourover" ? "Pour Over" : "Espresso"}
                  </button>
                </div>
                <div className="origin-summary-bar">
                  <span className="origin-summary-text">{totalCountries} ORIGINS · {allBeans.length} TOTAL ENTRIES</span>
                  <span className="origin-summary-text">ALL METHODS</span>
                </div>
                {allBeans.length === 0 ? (
                  <div className="empty-state">
                    <div className="empty-state-title">No beans logged yet.</div>
                    <div className="empty-state-sub">Add entries in Pour Over or Espresso tabs.</div>
                  </div>
                ) : (
                  sortedCountries.map(country => {
                    const beans = countryMap[country].sort((a, b) => b.rating - a.rating);
                    const avg = (beans.reduce((s, b) => s + b.rating, 0) / beans.length);
                    return (
                      <div key={country}>
                        <div className="origin-country-header">
                          <div className="origin-country-name">{country}</div>
                          <div className="origin-country-meta">
                            AVG {avg.toFixed(2)} · {beans.length} {beans.length === 1 ? "BEAN" : "BEANS"}
                          </div>
                        </div>
                        {beans.map(bean => (
                          <div key={bean.id + country} className="origin-bean-card">
                            <div className="origin-bean-left">
                              <div className="origin-bean-name">{bean.name}</div>
                              {bean.roaster ? <div className="origin-bean-roaster">{bean.roaster}</div> : null}
                              <div className="origin-bean-tags">
                                <span className="origin-method-badge">{bean.method}</span>
                                <span className="origin-method-badge">{bean.roast}</span>
                                <span className={bean.caffeine === "decaf" ? "decaf-badge" : "caff-badge"} style={{fontSize:"8px"}}>
                                  {bean.caffeine === "decaf" ? "Decaf" : "Caff"}
                                </span>
                              </div>
                            </div>
                            <div className="origin-bean-right">
                              <BeanRating rating={bean.rating} size={12} />
                              <span className="rating-num">{bean.rating.toFixed(2)}</span>
                            </div>
                          </div>
                        ))}
                      </div>
                    );
                  })
                )}
              </>
            );
          })()}

          {/* Detail view */}
          {!showOrigin && detailBean ? (
            <>
              <div className="detail-back">
                <button className="btn-back" onClick={() => setDetailId(null)}>
                  ← Back to {activeTab === "pourover" ? "Pour Over" : "Espresso"}
                </button>
              </div>
              <div className="detail-hero">
                <div className="detail-roast-label">{detailBean.roast.toUpperCase()} ROAST</div>
                <div className="detail-bean-name">{detailBean.name}</div>
                <div className="detail-roaster">{detailBean.roaster}</div>
                <div className="detail-rating-row">
                  <BeanRating rating={detailBean.rating} size={22} />
                  <span className="detail-rating-num">{detailBean.rating.toFixed(2)}</span>
                </div>
                <div className="detail-meta-badges">
                  <span className={detailBean.caffeine === "decaf" ? "decaf-badge" : "caff-badge"}>
                    {detailBean.caffeine === "decaf" ? "Decaf" : "Caffeine"}
                  </span>
                </div>
                {detailBean.countries && detailBean.countries.length > 0 && (
                  <div style={{marginTop:"10px"}}>
                    <div className="detail-section-label" style={{marginBottom:"6px"}}>Origin</div>
                    <div className="country-display-chips">
                      {detailBean.countries.map(c => (
                        <span key={c} className="country-display-chip" style={{fontSize:"10px",padding:"3px 8px"}}>{c}</span>
                      ))}
                    </div>
                  </div>
                )}
              </div>
              {detailBean.instructions ? (
                <div className="detail-instructions-section">
                  <div className="detail-section-label">Brew Instructions</div>
                  <div className="detail-instructions-text">{detailBean.instructions}</div>
                </div>
              ) : null}
              <div className="detail-actions">
                <button className="btn-delete" onClick={() => deleteBean(detailBean.id)}>Delete</button>
                <button className="btn-edit" onClick={() => openEdit(detailBean)}>Edit Entry</button>
              </div>
            </>
          ) : !showOrigin ? (
            <>
              <div className="edition-bar">
                <span className="edition-text">
                  {currentBeans.length} {currentBeans.length === 1 ? "ENTRY" : "ENTRIES"} · BY ROAST &amp; RATING
                </span>
                <span className="edition-text">{activeTab === "pourover" ? "POUR OVER" : "ESPRESSO"}</span>
              </div>

              <div className="add-bar">
                <button className="btn-add" onClick={openAdd}>+ Log New Bean</button>
              </div>

              {currentBeans.length === 0 ? (
                <div className="empty-state">
                  <div className="empty-state-title">No beans logged yet.</div>
                  <div className="empty-state-sub">Tap "Log New Bean" to record your first brew.</div>
                </div>
              ) : (
                Object.entries(grouped).map(([roast, beans]) => (
                  <div key={roast}>
                    <div className="roast-group-header">
                      <span className={`roast-dot ${roast}`} />
                      {roast.toUpperCase()} ROAST · {beans.length} {beans.length === 1 ? "ENTRY" : "ENTRIES"}
                    </div>
                    {beans.map((bean) => (
                      <div key={bean.id} className="bean-card" onClick={() => setDetailId(bean.id)}>
                        <div className="bean-card-header">
                          <div className="bean-name">{bean.name}</div>
                          <div className="rating-display">
                            <BeanRating rating={bean.rating} size={13} />
                            <span className="rating-num">{bean.rating.toFixed(2)}</span>
                          </div>
                        </div>
                        <div className="bean-roaster">{bean.roaster}</div>
                        <div className="bean-meta-row">
                          <span className={bean.caffeine === "decaf" ? "decaf-badge" : "caff-badge"}>
                            {bean.caffeine === "decaf" ? "Decaf" : "Caffeine"}
                          </span>
                        </div>
                        {bean.countries && bean.countries.length > 0 && (
                          <div className="country-display-chips" style={{marginTop:"5px"}}>
                            {bean.countries.map(c => (
                              <span key={c} className="country-display-chip">{c}</span>
                            ))}
                          </div>
                        )}
                        {bean.instructions ? (
                          <div className="instructions-preview">{bean.instructions}</div>
                        ) : null}
                      </div>
                    ))}
                  </div>
                ))
              )}
            </>
          ) : null}

          {/* Sticky bottom origin toggle */}
          {!showOrigin && (
            <div className="origin-bar">
              <button className="btn-origin" onClick={() => { setDetailId(null); setShowOrigin(true); }}>
                ⊕ View by Origin
              </button>
            </div>
          )}

          {/* Settings / Export / Import Modal */}
          {showSettings && (
            <div className="modal-overlay" onClick={(e) => e.target === e.currentTarget && setShowSettings(false)}>
              <div className="modal-sheet">
                <div className="modal-header">
                  <div className="modal-title">Settings</div>
                  <button className="modal-close" onClick={() => setShowSettings(false)}>✕</button>
                </div>

                <div className="settings-section-label">Data Transfer</div>

                {/* Export */}
                <div className="settings-row">
                  <div className="settings-row-title">Export All Data</div>
                  <div className="settings-row-desc">
                    Downloads a <strong>.json</strong> backup of every entry across both tabs. Save it to Files, iCloud, or AirDrop it to your new iPhone — then import it there.
                  </div>
                  <div className="settings-stat">
                    {data.pourover.length + data.espresso.length} total entries · {data.pourover.length} pour over · {data.espresso.length} espresso
                  </div>
                  <button className="btn-settings-action" onClick={handleExport}>
                    ↓ Download Backup
                  </button>
                </div>

                {/* Import */}
                <div className="settings-row">
                  <div className="settings-row-title">Import from Backup</div>
                  <div className="settings-row-desc">
                    Load a previously exported <strong>.json</strong> file. This will <em>replace</em> all current entries with the backup — use on a new device after exporting from your old one.
                  </div>
                  <input
                    type="file"
                    accept=".json,application/json"
                    className="import-file-input"
                    id="import-file"
                    onChange={handleImportFile}
                  />
                  <button
                    className="btn-settings-action outline"
                    onClick={() => { setImportMsg(null); document.getElementById("import-file").click(); }}
                  >
                    ↑ Choose Backup File
                  </button>
                  {importMsg && (
                    <div className={`import-msg ${importMsg.type}`}>{importMsg.text}</div>
                  )}
                </div>

                <div className="settings-section-label">App</div>

                {/* Refresh */}
                <div className="settings-row">
                  <div className="settings-row-title">Refresh App</div>
                  <div className="settings-row-desc">
                    Fetches the latest version of the app from GitHub. Your saved entries won't be affected — they live in your browser's local storage.
                  </div>
                  <button
                    className="btn-settings-action outline"
                    onClick={() => window.location.reload()}
                  >
                    ↺ Reload from GitHub
                  </button>
                </div>

                <div className="settings-section-label">How to move to a new iPhone</div>
                <div className="settings-row">
                  <div className="settings-row-desc" style={{fontStyle:"normal", lineHeight:"1.7"}}>
                    1. Tap <strong>Download Backup</strong> above and save the file to iCloud Drive or Files.<br/>
                    2. On your new iPhone, open this app in Safari and add it to your Home Screen.<br/>
                    3. Open the app, tap ⚙, choose <strong>Choose Backup File</strong>, and select your saved file.
                  </div>
                </div>

                <div className="form-actions" style={{gridTemplateColumns:"1fr"}}>
                  <button className="btn-cancel" onClick={() => setShowSettings(false)}>Close</button>
                </div>
              </div>
            </div>
          )}

          {/* Add / Edit Modal */}
          {showForm && (
            <div className="modal-overlay" onClick={(e) => e.target === e.currentTarget && closeForm()}>
              <div className="modal-sheet">
                <div className="modal-header">
                  <div className="modal-title">
                    {editingId ? "Edit Entry" : `New ${activeTab === "pourover" ? "Pour Over" : "Espresso"}`}
                  </div>
                  <button className="modal-close" onClick={closeForm}>✕</button>
                </div>

                <div className="form-body">
                  <div className="form-field">
                    <label className="form-label">Bean Name</label>
                    <input
                      className="form-input"
                      placeholder="e.g. Ethiopia Yirgacheffe"
                      value={form.name}
                      onChange={(e) => setForm({ ...form, name: e.target.value })}
                    />
                  </div>

                  <div className="form-field">
                    <label className="form-label">Roaster</label>
                    <input
                      className="form-input"
                      placeholder="e.g. Onyx Coffee Lab"
                      value={form.roaster}
                      onChange={(e) => setForm({ ...form, roaster: e.target.value })}
                    />
                  </div>

                  <div className="form-field">
                    <label className="form-label">Roast Level</label>
                    <div className="roast-selector">
                      {["light", "medium", "dark"].map((r) => (
                        <div
                          key={r}
                          className={`roast-opt ${form.roast === r ? `selected ${r}` : ""}`}
                          onClick={() => setForm({ ...form, roast: r })}
                        >
                          <span className={`roast-circle ${r}`} />
                          {r.toUpperCase()}
                        </div>
                      ))}
                    </div>
                  </div>

                  <div className="form-field">
                    <label className="form-label">Caffeine</label>
                    <div className="toggle-row">
                      <div
                        className={`toggle-opt ${form.caffeine === "caffeine" ? "selected-caff" : ""}`}
                        onClick={() => setForm({ ...form, caffeine: "caffeine" })}
                      >
                        ◉ Caffeinated
                      </div>
                      <div
                        className={`toggle-opt ${form.caffeine === "decaf" ? "selected-decaf" : ""}`}
                        onClick={() => setForm({ ...form, caffeine: "decaf" })}
                      >
                        ○ Decaf
                      </div>
                    </div>
                  </div>

                  <div className="form-field">
                    <label className="form-label">Country of Origin</label>
                    <CountrySelector
                      selected={form.countries || []}
                      onChange={(countries) => setForm({ ...form, countries })}
                    />
                  </div>

                  <div className="form-field">
                    <label className="form-label">Rating — out of 5</label>
                    <div className="bean-rating-row" style={{marginBottom: "10px"}}>
                      <BeanRating rating={form.rating} size={22} />
                      <span className="rating-num-display">{form.rating.toFixed(2)}</span>
                    </div>
                    <input
                      type="range"
                      className="rating-slider"
                      min={0}
                      max={5}
                      step={0.25}
                      value={form.rating}
                      onChange={(e) => setForm({ ...form, rating: parseFloat(e.target.value) })}
                    />
                    <div className="rating-scale-labels">
                      <span className="rating-scale-label">0</span>
                      <span className="rating-scale-label">5</span>
                    </div>
                  </div>

                  <div className="form-field">
                    <label className="form-label">Brew Instructions</label>
                    <textarea
                      className="form-textarea"
                      placeholder="Grind size, water temp, bloom time, ratios, tasting notes..."
                      value={form.instructions}
                      onChange={(e) => setForm({ ...form, instructions: e.target.value })}
                    />
                  </div>
                </div>

                <div className="form-actions">
                  <button className="btn-cancel" onClick={closeForm}>Cancel</button>
                  <button className="btn-save" onClick={saveForm}>
                    {editingId ? "Save Changes" : "Log Bean"}
                  </button>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<CoffeeLog />);
  </script>
</body>
</html>
